<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #E9EED9;
            font-family: 'Trebuchet MS', Arial, sans-serif;
            padding: 40px 20px;
        }

        .cart-container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px 35px;
        }

        h1 {
            text-align: center;
            color: #1B4332;
            font-size: 32px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        p {
            text-align: center;
        }

        /* book list styles */
        .cart-items {
            margin: 20px 0;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #eee8da;
        }

        .book-details {
            flex: 2;
        }

        .book-title {
            font-weight: 600;
            color: #1e3a2f;
            font-size: 16px;
        }

        .book-author {
            font-size: 13px;
            color: #7a6a5a;
            margin-top: 4px;
        }

        .empty-cart {
            text-align: center;
            padding: 50px 20px;
            background: #fcf9ef;
            border-radius: 16px;
            color: #8b7355;
            font-style: italic;
        }

        /* summary section */
        .summary {
            margin-top: 25px;
            background: #fafaf5;
            padding: 20px 20px;
            border-radius: 16px;
        }

        .summary-line {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 16px;
        }

        .total-line {
            display: flex;
            justify-content: space-between;
            padding: 15px 0 8px;
            font-size: 20px;
            font-weight: bold;
            border-top: 2px solid #d4e2ca;
            margin-top: 8px;
            color: #1B4332;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-top: 30px;
        }

        button {
            padding: 10px 28px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 40px;
            cursor: pointer;
        }

        .clear-btn {
            background-color: #f0e2d0;
            color: #7c4a2b;
        }

        .clear-btn:hover {
            background-color: #961d0f;
        }

        .checkout-btn {
            background-color: #2c6e49;
            color: white;
        }

        .checkout-btn:hover {
            background-color: #1B4332;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>Cart</h1>
        <p>Finalzing your collection... you're just a few clicks away from owning these books!</p>
        <br>

        <div class="cart-container">
            <h1>Order Summary</h1>

            <!-- books in cart -->
            <div id="cartItemsList" class="cart-items"></div>

            <!-- receipt -->
            <div class="summary">
                <div class="summary-line">
                    <span>Subtotal:</span>
                    <span id="subtotalValue">$0.00</span>
                </div>
                <div class="summary-line" id="discountRow">
                    <span>Volume Discount (10% off for 5+ books):</span>
                    <span id="discountValue">-$0.00</span>
                </div>
                <div class="summary-line" id="creditRow">
                    <span>Credits Available:</span>
                    <span id="donations">-$0.00</span>
                </div>
                <div class="summary-line">
                    <span>Tax:</span>
                    <span id="taxValue">$0.00</span>
                </div>
                <div class="total-line">
                    <span>Total:</span>
                    <span id="totalValue">$0.00</span>
                </div>
            </div>

            <br>

            <div class="applyCredCheckbox">
                Would you like to apply your credits to this purchase? 
                <input type="checkbox" id="credCheck">
            </div>

            <div class="btn-group">
                <button onclick="clearCart()" class="clear-btn" id="clearCartBtn">Clear Cart</button>
                <button onclick="handleCheckout()" class="checkout-btn" id="checkoutBtn">Checkout</button>
            </div>
            <br>
    </div>

    <script>
        let itemCount = 0;
        const storedEmail = localStorage.getItem('user_email');
        let availableCredits = 0;

        fetch(`/creditInfo?email=${encodeURIComponent(storedEmail)}`)
            .then(res => res.json())
            .then(user => {
                document.getElementById("donations").innerText = "-$" + user.donations * 5;
                availableCredits = user.donations * 5;
        });

        function displayCart() {
            // get cart from local storage and check if it's empty
            const stored = localStorage.getItem('shoppingCart');
            const cart = stored ? JSON.parse(stored) : { items: [] };

            const items = cart.items;
            const container = document.getElementById('cartItemsList');
            
            // display if cart is empty
            if (items.length === 0) {
                container.innerHTML = `<div class="empty-cart">Your cart is empty.<br>Add some great books from the store!</div>`;
                document.getElementById('subtotalValue').innerText = '$0.00';
                document.getElementById('discountValue').innerText = '-$0.00';
                document.getElementById('taxValue').innerText = '$0.00';
                document.getElementById('totalValue').innerText = '$0.00';
                return;
            }
            
            // display if cart is not empty
            let booksHTML = '';
            
            // list books in cart
            for (let i = 0; i < items.length; i++) {
                const book = items[i];
                
                const title = book.title || 'Unknown Title';
                const author = book.author || 'Unknown Author';
                subtotal += 5;
                
                booksHTML += `
                    <div class="cart-item">
                        <div class="book-details">
                            <div class="book-title">${title}</div>
                            <div class="book-author">by ${author}</div>
                        </div>
                        <div>$5</div>
                    </div>
                `;
            }
            
            // apply volume discount if needed
            itemCount = items.length;
            let discountAmount = 0;
            
            if (itemCount >= 5) {
                discountAmount = subtotal * 0.1;
            }
        
            const taxAmount = (subtotal - discountAmount) * 0.0625;
            const currTotal = subtotal - discountAmount + taxAmount;
            
            // formatting
            const subtotalFormatted = subtotal.toFixed(2);
            const discountFormatted = discountAmount.toFixed(2);
            const taxFormatted = taxAmount.toFixed(2);
            const totalFormatted = currTotal.toFixed(2);
            
            // display books as part of container and set receipt numbers
            container.innerHTML = booksHTML;
            
            document.getElementById('subtotalValue').innerHTML = `$${subtotalFormatted}`;
            document.getElementById('discountValue').innerHTML = `-$${discountFormatted}`;
            document.getElementById('taxValue').innerHTML = `$${taxFormatted}`;

            // check if donations should be applied
            var checkBox = document.getElementById("credCheck");
            if (checkBox.checked) {
                if (availableCredits >= currTotal) {
                    document.getElementById('totalValue').innerText = '$0.00';
                    availableCredits = availableCredits - currTotal;
                } else {
                    let finalTotal = totalFormatted - availableCredits;
                    document.getElementById('totalValue').innerText = `$${finalTotal}`;
                    availableCredits = 0;
                }
            } else {
                document.getElementById('totalValue').innerHTML = `$${totalFormatted}`;
            }
        }
        
        // Clear all items from cart
        function clearCart() {
            if (itemCount == 0) {
                alert("Cart is already empty.");
                return;
            }
        
            // clear cart and refresh
            const confirmClear = confirm("Are you sure you want to remove all books from your cart?");
            if (confirmClear) {
                const emptyCart = { items: [] };
                localStorage.setItem('shoppingCart', JSON.stringify(emptyCart));
                displayCart();
                alert("Cart cleared successfully.");
            }
        }
        
        function handleCheckout() {
            if (itemCount == 0) {
                alert("Your cart is empty. Add some books first.");
                return;
            }

            availableCredits = availableCredits / 5;

            const userDonations = new URLSearchParams({ email: storedEmail, donations: availableCredits });

            fetch(`/useCredit?donations=${userDonations.toString()}`);
        
            alert("Proceeding to checkout!\n Thank you for shopping with us!");
        }
        
        // render on page load
        document.addEventListener('DOMContentLoaded', () => {
            displayCart();
        });
    </script>
</body>
</html>
