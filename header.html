<html>
    <head>
        <link rel="stylesheet" href="style.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        />
        <style type="text/css">
    
            .profile-pic {
                height: 80%;
                aspect-ratio: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #E9EED9;
                color: #1B4332;
                border-radius: 50%;
                font-weight: bold;
                font-size: 32px;
                text-transform: uppercase;
            }

            .profile-links-container {
                display: flex;
                flex-direction: row;
                align-items: center;
            }

        </style>
    </head>
    <body>
        <!-- Navigation bar -->
        <nav class="navBar">
            <!-- Logo and brand name -->
            <a href="home" class="brandName">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24">
                    <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 19a9 9 0 0 1 9 0a9 9 0 0 1 9 0M3 6a9 9 0 0 1 9 0a9 9 0 0 1 9 0M3 6v13m9-13v13m9-13v13" />
                </svg>
                <h1>Secondhand Stories</h1>
            </a>

            <div class="profile-links-container">
                <!-- Actual navigation -->
                <div class="allLinks">
                    <a class="cartLink" href="cart"><button>Cart</button></a>
                    <ul class="navLinks">
                        <li><a href="about">About</a></li>
                        <li><a href="catalog">Catalog</a></li>
                        <li><a href="donate">Donate</a></li>
                        <li><a href="leaderboard">Leaderboard</a></li>
                    </ul>
                </div>
                <div id="profile"></div>
            </div>
        </nav>
        <!-- End of navigation bar -->
     </body>
     
     <script>

        // Try to get user data from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const first = urlParams.get('first');
        const last = urlParams.get('last');
        const email = urlParams.get('email');

        if (first && last) {
            // Save it to localStorage for future use
            localStorage.setItem('user_first', first);
            localStorage.setItem('user_last', last);
            localStorage.setItem('user_email', email); // Save the email!
        }

        // Retrieve data from localStorage
        const storedFirst = localStorage.getItem('user_first');
        const storedLast = localStorage.getItem('user_last');

        if (storedFirst && storedLast) {
            // Extract the first letter of each and capitalize them
            const initials = (storedFirst[0] + storedLast[0]).toUpperCase();

            document.getElementById("profile").innerHTML = `
                <div class="profile-pic">
                    ${initials}
                </div>
            `;
        }

        // Logout function
        function logout() {
            localStorage.removeItem('user_first');
            localStorage.removeItem('user_last');
            window.location.href = "/home";
        }

    </script>
</html>
