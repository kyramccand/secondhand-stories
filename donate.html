<html>
<style type="text/css">
    
    .helper-text {
        font-size: 14px;
        margin-top: 10px;
    }

    p {
        text-align: center;
        width: 70%;
    }

    @media (max-width: 768px) {
        .isbn-search-container {
            width: 90%;
            padding: 25px;
        }

        p {
            width: 90%;
        }
    }
</style>

<body>
    <div class="content">
        <div class="page-center-container">
            <h1>Donate</h1>
            <p class="description">Ready to share a story? Simply enter the 13-digit ISBN found on the back of your book, and we'll handle the rest.</p>
            
            <div class="form-container">
                    <h3>Enter ISBN</h3>
                    <form action="process-donate" method="POST">
                        <label for="isbn">ISBN Number</label>
                        <input id="isbn-input" name="isbn" type="number" required>
                        
                        <input type="hidden" name="email" id="email">
                        
                        <input type="submit" value="Donate Book">
                    </form>
                    <span class="helper-text">You can usually find the ISBN above the barcode.</span>
            </div>
        </div>
    </div>
</body>
<script>
    window.addEventListener('DOMContentLoaded', () => {
        // Get the user email from local storage
        const storedEmail = localStorage.getItem('user_email');
        
        // Safety check
        if (!storedEmail) {
            alert("Please log in before donating!");
            window.location.href = "/login?error=before_donate";
            return;
        }
        
        // Set the hidden input field for later processing
        document.getElementById('email').value = storedEmail;

        // Handle errors
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error') == "not_found") {
            alert("We couldn't find a book with that ISBN. Please double-check the number.");
        }
    });
</script>
</html>
