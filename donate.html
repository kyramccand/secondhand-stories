<!DOCTYPE html>
<html lang="en">
<html>
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="keywords" content="secondhand books, affordable books, book donations, global literacy, sustainability" />
    <meta name="description" content="Support Secondhand Stories by donating books and helping to promote global literacy." />
    <title>Donate</title>
    <link rel="stylesheet" href="style.css" />
     <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
<head>
    <title>Donate</title>
    <link rel="stylesheet" href="style.css">
    <style type="text/css">
        .autofill {
            display: flex;
            flex-direction: column;
            align-items: start;
            background-color: #1B4332;
            color: #E9EED9;
            border-radius: 10px;
            width: 80%;
            padding: 30px;
            margin-bottom: 40px;
        }

        .autofill form {
            display: flex; 
            flex-direction: row;
            justify-content: flex-start; 
            align-items: flex-end;
            gap: 20px;
            width: 100%;
        }

        .autofill h3 {
            color: #E9EED9;
            margin: 10px 0;
        }

        .autofill form label {
            color: #E9EED9;
        }

        .autofill input {
            width: 100%;
        }

        .autofill input[type="submit"] {
            width: 40px;
            height: 40px;
            cursor: pointer;
            border-radius: 100px;
            background-image: url("./images/magnifier-glass-icon.png");
            background-size: 20px;
            background-position: center;
            background-repeat: no-repeat;
            display: inline-block;
            margin: 10px 0 0 0;
        }

        .fields {
            display: flex;
            flex-direction: row;
            gap: 20px;
            width: 100%;
        }

        .field-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            flex: 1;
        }

        p {
            width: 60%;
            text-align: center;
        }

        .form-container label {
            display: block;
            text-align: left;
        }

        @media (max-width: 768px) {

            form {
                width: 90%;
            }
            
            .fields {
                flex-direction: column;
            }

            .autofill form {
                flex-direction: column;
            }

            .autofill {
                width: 90%;
            }

            .autofill input[type="submit"] {
                width: 100%;
                border-radius: 20px;
                background-size: 20px;
                display: block;
                margin: 10px auto;
            }
        }

    </style>
</head>
<body>
    <div class="content">
        <div class="page-center-container">
            <h1>Donate</h1>
            <p>Don't let your old books collect dust on your shelves! Fill out
               the information below to donate your books. You may enter Book
                details manually or use our built in ISBN autofill feature to
                save time.</p>
            <div class="form-container">
                <!-- Autofill form container-->
                <div class="autofill">
                    <h3>Autofill</h3>
                    <form action="process-autofill" method="POST">
                        <div class="fields">
                            <div class="field-container">
                                <label for="title">Title</label>
                                <input id="title-input" name="title" type="text">
                            </div>
                            <div class="field-container">
                                <label for="isbn">ISBN</label>
                                <input id="isbn-input" name="isbn" type="number">
                            </div>
                        </div>
                        <!-- The submit button is a search icon -->
                        <input type="submit" value="">
                    </form>
                </div>
                <!-- End of autofill container -->

                <form action="process-donate" method="POST">
                <!--prev form tag-->
                    <label for="title">Title</label>
                    <input id="title" name="title" type="text">
                    <label for="author">Author</label>
                    <input id="author" name="author" type="text">
                    <input type="submit" value="Submit">
                    <input type="hidden" name="email" id="email">
                </form>
                <div id="result"></div>
            </div>
            <!-- End of form container -->
        </div>
        <!-- End of centered page -->
    </div>
    <!-- End of content -->
</body>
<script>
    window.addEventListener('DOMContentLoaded', () => {
        // Get the user email from local storage
        const storedEmail = localStorage.getItem('user_email');
        // Check that the email exists
        if (!storedEmail) {
            alert("Please log in before donating!");
            window.location.href = "/login?error=before_donate";
            return;
        }
        // Set the hidden input field to this email
        document.getElementById('email').value = storedEmail;
        // Fetch the url parameters
        const urlParams = new URLSearchParams(window.location.search);
        // Handle any errors indicated
        if (urlParams.get('error') == "not_found") {
            alert("Sorry, we couldn't find a book matching that information.");
        }
        if (urlParams.get('title') && urlParams.get('author')) {
            document.getElementById("title").value = urlParams.get('title');
            document.getElementById("author").value = urlParams.get('author');

            // Clean the URL so a refresh doesn't keep the params
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    });
</script>
</html>
