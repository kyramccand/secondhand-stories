<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="View the leaderboard and see how you rank among other book lovers."
    />
    <title>Leaderboard</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      .leaderboard-page {
        background: #e9eed9;
        min-height: 80vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px 60px;
      }

      .leaderboard-subtitle {
        font-size: 16px;
        color: #1b4332;
        text-align: center;
        margin: 0 0 40px;
        line-height: 1.5;
      }

      .podium {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        margin-bottom: 40px;
        width: 100%;
        max-width: 800px;
      }

      .podium-place {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .podium-name {
        color: #1b4332;
        text-align: center;
        margin-bottom: 6px;
        max-width: 130px;
      }

      .podium-block {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        font-family: Cambria, Georgia, serif;
        font-weight: 700;
        border-radius: 4px 4px 0 0;
      }

      .podium-1 .podium-block {
        width: 260px;
        height: 200px;
        font-size: 96px;
      }
      .podium-2 .podium-block {
        width: 220px;
        height: 150px;
        font-size: 72px;
      }
      .podium-3 .podium-block {
        width: 220px;
        height: 110px;
        font-size: 72px;
      }

      .rankings-wrapper {
        width: 100%;
        max-width: 800px;
      }

      .rankings-header {
        display: grid;
        grid-template-columns: 60px 1fr auto;
        padding: 8px 16px;
        font-family: "Trebuchet MS", Arial, sans-serif;
        font-size: 17px;
        font-weight: 700;
        color: #1b4332;
        margin-bottom: 4px;
      }

      .rankings-header .col-donations {
        text-align: right;
      }

      .rank-row {
        display: grid;
        grid-template-columns: 60px 1fr auto;
        align-items: center;
        background: #ffffff;
        border-radius: 8px;
        padding: 14px 16px;
        margin-bottom: 8px;
        font-family: "Trebuchet MS", Arial, sans-serif;
        font-size: 17px;
        color: #1b4332;
      }

      .rank-row .rank-num {
        font-weight: 700;
        color: #081c15;
      }
      .rank-row .donations-val {
        color: #5a7a60;
        text-align: right;
      }

      .loading-msg {
        color: #5a7a60;
        font-family: "Trebuchet MS", Arial, sans-serif;
        font-size: 16px;
        padding: 20px;
      }

      .error-msg {
        color: #c0392b;
        font-family: "Trebuchet MS", Arial, sans-serif;
        font-size: 15px;
        padding: 20px;
      }

      .donations-count {
        color: #1b4332;
        width: 100%;
        text-align: center;
        background: #ffffff;
        padding: 30px;
      }

      @media (max-width: 768px) {
        .podium-1 .podium-block {
          width: 130px;
          height: 120px;
          font-size: 56px;
        }
        .podium-2 .podium-block {
          width: 110px;
          height: 85px;
          font-size: 42px;
        }
        .podium-3 .podium-block {
          width: 110px;
          height: 65px;
          font-size: 42px;
        }
        .podium-name {
          font-size: 13px;
          max-width: 110px;
        }
      }
    </style>
  </head>
  <body>
    <div class="content">
      <div class="leaderboard-page">
        <h1>Leaderboard</h1>
        <p class="description">
          We greatly appreciate our donors who help make our goal of
          accessibility of literature.<br />
          Here are the top donors at Secondhand Stories:
        </p>

        <!-- Podium: top 3 -->
        <div class="podium" id="podium">
          <p class="loading-msg">Loading...</p>
        </div>

        <!-- Ranks 4+ -->
        <div class="rankings-wrapper" id="rankingsWrapper">
          <div class="rankings-header">
            <span>Rank</span>
            <span>Name</span>
            <span class="col-donations">Donations</span>
          </div>
          <div id="rankingsList"></div>
        </div>
      </div>
    </div>

    <script>
      async function loadLeaderboard() {
        const podium = document.getElementById("podium");
        const rankingsList = document.getElementById("rankingsList");

        try {
          const res = await fetch("/get-leaderboard");
          if (!res.ok) throw new Error("Server error");
          const donors = await res.json();

          if (!donors.length) {
            podium.innerHTML =
              '<p class="loading-msg">No donations yet — be the first!</p>';
            return;
          }

          // Builds podium
          const podiumOrder = [donors[1], donors[0], donors[2]];
          const podiumClasses = ["podium-2", "podium-1", "podium-3"];
          const medals = ["2", "1", "3"];

          podium.innerHTML = podiumOrder
            .map((donor, i) => {
              if (!donor) return ""; // fewer than 3 donors
              const name = donor.firstName + " " + donor.lastName;
              const numDonations = donor.donations;
              return `
                        <div class="podium-place ${podiumClasses[i]}">
                            <div class="podium-name">${escapeHtml(name)}</div>
                            <div class="podium-block">${medals[i]}</div>
                            <div class="donations-count">Dontaions: ${numDonations}</div>
                        </div>`;
            })
            .join("");

          // For the rows
          if (donors.length <= 3) {
            rankingsList.innerHTML = "";
            return;
          }

          rankingsList.innerHTML = donors
            .slice(3)
            .map((donor, i) => {
              const name = donor.firstName + " " + donor.lastName;
              return `
                        <div class="rank-row">
                            <span class="rank-num">${i + 4}</span>
                            <span class="name">${escapeHtml(name)}</span>
                            <span class="donations-val">${donor.donations}</span>
                        </div>`;
            })
            .join("");
        } catch (err) {
          podium.innerHTML = `<p class="error-msg">Failed to load leaderboard: ${err.message}</p>`;
        }
      }

      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      loadLeaderboard();
    </script>
  </body>
</html>
