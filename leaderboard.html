<!DOCTYPE html>
<html lang="en">
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="keywords" content="secondhand books, affordable books, book donations, global literacy, sustainability" />
    <meta name="description" content="View the leaderboard and see how you rank among other book lovers." />
    <title>Leaderboard</title>
    <link rel="stylesheet" href="style.css" />
     <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  <style>

    .leaderboard-page {
            background: #E9EED9;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 60px;
        }
 
        .leaderboard-subtitle {
            font-size: 16px;
            color: #1B4332;
            text-align: center;
            margin: 0 0 40px;
            line-height: 1.5;
        }

    .podium {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            margin-bottom: 40px;
            width: 100%;
            max-width: 500px;
        }
 
        .podium-place {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
 
        .podium-name {
            font-family: 'Trebuchet MS', Arial, sans-serif;
            font-size: 15px;
            color: #1B4332;
            text-align: center;
            margin-bottom: 6px;
            max-width: 130px;
        }
 
        .podium-block {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            font-family: Cambria, Georgia, serif;
            font-weight: 700;
            color: #081C15;
            border-radius: 4px 4px 0 0;
        }
 
        .podium-1 .podium-block {
            width: 180px;
            height: 160px;
            font-size: 72px;
        }
 
        .podium-2 .podium-block {
            width: 150px;
            height: 110px;
            font-size: 56px;
        }
 
        .podium-3 .podium-block {
            width: 150px;
            height: 80px;
            font-size: 56px;
        }
 
        /* Rankings Table */
        .rankings-wrapper {
            width: 100%;
            max-width: 500px;
        }
 
        .rankings-header {
            display: grid;
            grid-template-columns: 60px 1fr auto;
            padding: 8px 16px;
            font-family: 'Trebuchet MS', Arial, sans-serif;
            font-size: 17px;
            font-weight: 700;
            color: #1B4332;
            margin-bottom: 4px;
        }
 
        .rankings-header .col-donations {
            text-align: right;
        }
 
        .rank-row {
            display: grid;
            grid-template-columns: 60px 1fr auto;
            align-items: center;
            background: #ffffff;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 8px;
            font-family: 'Trebuchet MS', Arial, sans-serif;
            font-size: 17px;
            color: #1B4332;
        }
 
        .rank-row .rank-num {
            font-weight: 700;
            color: #081C15;
        }
 
        .rank-row .donations-val {
            color: #5a7a60;
            text-align: right;
        }
 
        .ellipsis-row {
            text-align: center;
            font-size: 20px;
            color: #5a7a60;
            letter-spacing: 3px;
            padding: 6px 0;
            margin-bottom: 8px;
        }
 
        @media (max-width: 768px) {
            .podium-1 .podium-block { width: 130px; height: 120px; font-size: 56px; }
            .podium-2 .podium-block { width: 110px; height: 85px; font-size: 42px; }
            .podium-3 .podium-block { width: 110px; height: 65px; font-size: 42px; }
            .podium-name { font-size: 13px; max-width: 110px; }
        }
  </style>
<body>
    <div class="content">
        <div class="leaderboard-page">
                <h2>Leaderboard</h2>
                <p class="leaderboard-subtitle">We greatly appreciate our donors who help make our goal of accessibility of literature.<br>
                    Here are the top donors at Secondhand Stories:
                </p>

        <div class="podium">
            <div class="podium-place podium-2">
                <div class="podium-name">A</div>
                <div class="podium-block">0</div>
            </div>
            <div class="podium-place podium-1">
                <div class="podium-name">B</div>
                <div class="podium-block">6</div>
            </div>
            <div class="podium-place podium-3">
                <div class="podium-name">C</div>
                <div class="podium-block">7</div>
            </div>
        </div>

        <div class="rankings-wrapper">
            <div class="rankings-header">
                <span>Rank</span>
                <span>Name</span>
                <span class="col-donations">Donations</span>
            </div>

            <div class="rank-row">
                <span class="rank-num">4</span>
                <span class="name">D</span>
                <span class="donations-val">3</span>
            </div>
            <div class="rank-row">
                <span class="rank-num">5</span>
                <span class="name">E</span>
                <span class="donations-val">5</span>
            </div>
    </div>
        </div>

     <footer>
        <div>&copy; 2026 Secondhand Stories. All rights reserved. | </div>
        <div>
            <a href="privacy-policy">Privacy Policy</a> |
            <a href="terms-of-service">Terms of Service</a>
        </div>
    </footer>
</body>
</html>
