<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
<style>
        
.card-container {
    display: flex;
    justify-content: center;
    padding: 50px 20px;
    align-items: center;
    min-height: 80vh; 
}

.book-card {
    background-color: white;
    border-radius: 15px;
    padding: 30px;
    width: 100%;
    max-width: 650px;
    box-sizing: border-box;
}

.card-header h1 {
    text-align: center;
    margin-top: 0;
    font-weight: 500;
}


.card-body {
    display: flex;
    gap: 25px;
    margin: 20px 0;
}


.book-image-placeholder {
    width: 240px;
    height: 320px;
    background-color: #dcdcdc;
}


.book-info p {
    margin: 12px 0;
    font-size: 1.1rem;
    color: #000;
}


.card-footer {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

.cart-btn {
    background-color: #f4be52; 
    border: none;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
}




    </style>
</head>
<body>
    <div class="content">
    <div class="card-container">
    <div class="book-card">
        
        <div class="card-header">
            <h1>Book Details</h1>
        </div>

        <div class="card-body">
            <img id="book-cover" class="book-image-placeholder" src="" alt="Book Cover">

            <div class="book-info">
                <p><strong>Title:</strong> <span id="info-title">Loading...</span></p>
                <p><strong>Author:</strong> <span id="info-author">...</span></p>
               
                <p><strong>Date:</strong> <span id="info-date">...</span></p>
                <p><strong>Genre:</strong> <span id="info-genre">...</span></p>
            </div>
        </div>
        

        <div class="card-footer">
            <button onclick="addToCart()" class="cart-btn">Add to Cart</button>
        </div>

    </div>
</div>

</div>

    <script>
        
        const book = window.selectedBook;

        if (!book) {
            document.getElementById("info-title").innerText = "Book not found.";
        } else {
            const bookData = {
                title: document.getElementById("info-title").innerText = book.title || "Unknown",
                author: document.getElementById("info-author").innerText = book.author || "Unknown",
                pubDate: document.getElementById("info-date").innerText = book.year || "Unknown",
                genre: document.getElementById("info-genre").innerText = book.genre || "Unknown",
                cover: document.getElementById("book-cover").src = book.image || 'images/no-cover.jpeg',
            };

            window.currentBook = bookData;
        }

        function addToCart() {
            if (!window.currentBook) {
                alert('The book is still loading. Please wait.');
                return;
            }

            // Get existing cart or create one if it doesn't exist
            let cart = localStorage.getItem('shoppingCart');

            if (!cart) {
                cart = { items: []};
            } else {
                cart = JSON.parse(cart);
            }

            // enforce customer cannot order two of the same books in one session
            const duplicateCheck = cart.items.some(item => item.title == window.currentBook.title);
            if (duplicateCheck) {
                alert("At Secondhand Stories we value reusing existing books, and stand against overconsumption. For this reason we enforce that if a user wants to purchase multiple copies of the same book, they do so across multiple sessions to have more time to reflect on the pros of purchasing a new book as opposed to sharing copies");
                return;
            }

            // add book to cart
            cart.items.push({
                title: window.currentBook.title,
                author: window.currentBook.author,
            });

            // save cart to local storage
            localStorage.setItem('shoppingCart', JSON.stringify(cart));
            alert(`${window.currentBook.title} added to cart!`);
            window.location.href = "./catalog";
        }
    </script>
