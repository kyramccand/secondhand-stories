    display: flex;

.book-card {
    background-color: white;
    border-radius: 15px;
    padding: 30px;
    width: 100%;

}

.card-header h1 {
    text-align: center;
    margin-top: 0;
    font-weight: 500;
}


.card-body {
    display: flex;
    gap: 25px;
    margin: 20px 0;
}


.book-image-placeholder {
    width: 240px;
    height: 300px;
    background-color: #dcdcdc;
    flex-shrink: 0; 
}


.book-info p {
    margin: 12px 0;
    font-size: 1.1rem;
    color: #000;
}


.card-footer {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

.cart-btn {
    background-color: #f4be52; 
    border: none;
    padding: 10px 40px;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
}
