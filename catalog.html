<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="keywords" content="secondhand books, affordable books, book donations, global literacy, sustainability" />
    <meta name="description" content="View our catalog of affordable secondhand books." />
    <title>Catalog</title>
    <link rel="stylesheet" href="style.css" />
     <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  <style></style>

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* 100% of viewport height */
            margin: 0;
        }
        .header {
            text-align: center;
            margin-bottom: 6px;
        }
        
        .header p {
            font-size: 18px;
            color: #000000;
            width: 70%;
            margin: 0 auto;
            margin-top: 20px;
            margin-bottom: 40px;
            
        }
        .search-bar {
            background: #1B4332;
            border-radius: 16px;
            padding: 28px 32px;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-direction: row;
            
            margin-left: auto;
            margin-right: auto;
            box-sizing: border-box;
            flex-shrink: 0;
            margin: 0 auto 40px auto;
            width: 100%;
            max-width: 1000px;
            height: auto;
        }
        .search-title {
            flex: 1;
        }
        .search-bar label {
            color: #ffffff;
        }
        .search-title,
        .search-author,
        .search-genre,
        .search-year {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }
        .search-btn {
            width: 44px;
            height: 44px;
            background-color: #FFB703;
            background-image: url("./images/magnifier-glass-icon.png");
            background-size: 60%;
            background-repeat: no-repeat;
            background-position: center;
            border: none;
            border-radius: 50%;
            margin-bottom: 2px;
            margin-top: 20px;
            
        }
        .search-btn:hover {
            background: #f5b002;
            
            background-image: url("./images/magnifier-glass-icon.png");
            background-size: 60%;
            background-repeat: no-repeat;
            background-position: center;
        }
        .search-bar input {
            border-radius: 7px;
            background: #ffffff;
            width: 100%;
        }

        .search-bar input:focus {
            outline: none;
        }

        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            align-items: start;
            max-width: 1000px;
            margin: 0 auto;
            justify-items: center;
        }
        .book-card {
            background: #FFFFFF;
            border-radius: 18px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;  
            max-width: 330px;
            height: 100%;
            
        }
        
        .book-cover {
            background: #D9D9D9;
            border-radius: 10px;
            width: 100%;
            height: 320px;
            aspect-ratio: 4/5;
            object-fit: cover;
            object-position: center;
            display: block;
            height: 320px;

        }
        .book-info { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 4px; 
        }
        .book-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a2e1a;
            line-height: 1.25;
            margin-bottom: 6px;
        }
        .book-meta {
            font-size: 16px;
            color: #000000;
        }

        .book-meta strong { 
            color: #000000;
        }

        h4 {
            margin-bottom: 10px;
        }
        
        .wrap {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 24px;
            flex: 1;
            
        }

        @media (max-width: 878px) {
            .catalog-grid {
                grid-template-columns: repeat(2, minmax(0, 300px));
                /* from w2 schools... https://www.w3schools.com/cssref/func_minmax.php */
                justify-content: center;
            }
        }

        @media (max-width: 650px) {
            .catalog-grid {
                grid-template-columns: minmax(0, 300px);
                justify-content: center;
            }

            .header p {
                width: 90%;
            }
        }

        @media (max-width: 100px) {
            .catalog-grid {
                grid-template-columns: 1fr;
            }

        }
    </style>
</head>
<body>
    <div class = "content">
    <div class="wrap">
        <div class="header">
            <h1>Catalog</h1>
            <p class="description">Browse our collection of affordable, secondhand books. 
                Each book was donated from a user or sourced from a closing 
                library. Find your next read and give a book a new home.</p>
        </div>

        
        <form action="/process-catalog" method="POST" class="search-bar">
            <div class="search-title">
                <label>Title</label>
                <input type="text" name="title" id="search-title">
            </div>
            <div class="search-author">
                <label>Author</label>
                <input type="text" name="author" id="search-author">
            </div>
            <div class="search-genre">
                <label>Genre</label>
                <input type="text" name="genre" id="search-genre">
            </div>
            <div class="search-year">
                <label>Year</label>
                <input type="text" name="year" id="search-year">
            </div>
            <button type="submit" class="search-btn"></button>
        </form>

        <div class="catalog-grid" id="catalog-grid">
            
    </div>
    </div>
</body>
<script>
    const bookResults = window.myLibraryData || [];
    const grid = document.getElementById('catalog-grid');

    function renderCatalog() {
        grid.innerHTML = ""; //clear the grid

        if (bookResults.length === 0) {
            grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center;'>No books found in our library. Try a different search!</p>";
            return;
        }

        bookResults.forEach(book => {
            // use the image saved in DB
            const coverSrc = book.image || 'images/no-cover.jpeg';

            grid.innerHTML += `
                <div class="book-card">
                    <img class="book-cover" src="${coverSrc}" alt="${book.title}">
                    <div class="book-info">
                        <h4>${book.title}</h4>
                        <div class="book-meta">
                            <strong>Author</strong>: ${book.author}<br>
                            <strong>Published</strong>: ${book.year}<br>
                            <strong>Genre</strong>: ${book.genre}
                        </div>
                    </div>
                    <a href="see-details?id=${book._id}" style="align-self: center; text-decoration: none;">
                        <button>See details</button>
                    </a>
                </div>
            `;
        });
    }

    // Run when page loads
    renderCatalog();
</script>
</html>
